# Triggered on skill-improvement/* labeled PRs — posts 4-dimension org impact assessment.
# Phase 0 scaffold only. Full implementation: Phase 3.

name: SAP FusionForge — Org Observer [Self-Improvement Layer 3]

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: read

jobs:
  org-assessment:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && startsWith(github.event.label.name, 'skill-improvement/')) }}
    steps:
      - uses: actions/checkout@v4

      - name: Scaffold placeholder (Phase 3)
        run: echo 'org-observer: Phase 3 implementation'

      - name: Post 4-dimension assessment comment (scaffold)
        uses: actions/github-script@v7
        with:
          script: |
            const label = context.payload.label ? context.payload.label.name : 'skill-improvement/unknown';
            const body = [
              '## 🔭 Org Observer Assessment — Phase 0 Scaffold',
              '',
              '> **Note:** Full Org Observer runs in Phase 3. This is a scaffold to confirm the trigger works.',
              '',
              '',
              '### 4-Dimension Framework (Phase 3)',
              '',
              '| # | Dimension | Status |',
              '|---|-----------|--------|',
              '| 1 | Core Objective Alignment | 🔲 Phase 3 |',
              '| 2 | Artifact Contract Integrity | 🔲 Phase 3 |',
              '| 3 | Scope Creep Check | 🔲 Phase 3 |',
              '| 4 | Phase Coherence | 🔲 Phase 3 |',
              '',
              '**Phase 3 will:** Run LLM evaluation across all 4 dimensions and post detailed assessment.',
              '',
              '*Automated by org-observer.yml*'
            ].join('\n');

            if (context.payload.pull_request) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body
              });
            } else {
              console.log('Manual dispatch — no PR to comment on');
              console.log(body);
            }